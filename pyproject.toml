[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "indiestack"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "aiosqlite>=0.19.0",
    "python-multipart>=0.0.6",
    "stripe>=8.0.0",
    "mcp[cli]>=1.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/indiestack"]
