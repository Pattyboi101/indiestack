<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1A2D4A;
      color: #E8E8E8;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 4px;
      color: white;
    }
    p {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin: 0 0 16px;
      line-height: 1.5;
    }
    .search-box {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      font-size: 13px;
      background: rgba(255,255,255,0.06);
      color: white;
      outline: none;
    }
    input::placeholder { color: rgba(255,255,255,0.3); }
    input:focus { border-color: #00D4F5; }
    button {
      padding: 8px 14px;
      background: #00D4F5;
      color: #1A2D4A;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #33DDFF; }
    .results { margin-top: 8px; }
    .result-item {
      display: block;
      padding: 10px;
      border-radius: 8px;
      text-decoration: none;
      color: #E8E8E8;
      margin-bottom: 4px;
    }
    .result-item:hover { background: rgba(255,255,255,0.06); }
    .result-item strong { display: block; color: white; font-size: 14px; }
    .result-item span { font-size: 12px; color: rgba(255,255,255,0.5); }
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }
    .footer a {
      font-size: 12px;
      color: #00D4F5;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>IndieStack</h1>
  <p>Search 793+ indie creations</p>
  <div class="search-box">
    <input type="text" id="search" placeholder="auth, analytics, email...">
    <button id="go">Search</button>
  </div>
  <div id="results" class="results"></div>
  <div class="footer">
    <a href="https://indiestack.ai/explore" target="_blank">Open IndieStack</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
